openapi: 3.0.3
info:
  title: API Doku für das Zuch Projekt
  description: |-
    Diese Dokumentation soll genutzt werden um die kommunikation von client zu server umzusetzen
  version: 1.0.0
servers:
  - url: https://zuch.yaat.eu/api/
    description: Haupt Zuch Server
tags:
  - name: train
    description: Operationen um züge zu erstellen löschen bearbeiten
  - name: signal
    description: Operationen für Signale
  - name: schedule
    description: Operationen für schedules
  - name: tile
    description: operationen für TIles, eigentlich nur clear
  - name: station
    description: Operationen für stationen
paths:
  # /trains/list:
  #   get:
  #     tags:
  #       - train
  #     summary: lists all trains
        
  /pet:
    put:
      tags:
        - pet
      summary: Update an existing pet.
      description: Update an existing pet by Id.
      operationId: updatePet
      requestBody:
        description: Update an existent pet in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
          application/xml:
            schema:
              $ref: '#/components/schemas/Order'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Order'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
            application/xml:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid ID supplied
        '404':
          description: Pet not found
        '422':
          description: Validation exception
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
components:
  schemas:
    Tile: 
      type: object
      properties:
        X: 
          type: integer
          example: 5
        Y: 
          type: integer
          example: 5
        Tracks: 
          type: array
          items:
            type: boolean
          example: [true,false,false,true]
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: [10]
        petId:
          type: integer
          format: int64
          example: [198772]
        quantity:
          type: integer
          format: int32
          example: [7]
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: Order Status
          example: [approved]
          enum:
            - placed
            - approved
            - delivered
        complete:
          type: boolean
      xml:
        name: order